<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المنصة | منصة سكينة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="nav-container">
            <a href="index.html" class="brand-logo"><div class="crescent-icon"><i class="fa-solid fa-moon"></i></div><span class="brand-name">سكينة</span></a>
            <nav><ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-house"></i> الرئيسية</a></li>
                <li><a href="settings.html" class="active"><i class="fa-solid fa-gear"></i> الإعدادات</a></li>
            </ul></nav>
        </div>
    </header>

    <main class="container">
        <section class="card" style="background: white; padding: 25px; border-radius: 15px;">
            <h2 style="color: var(--emerald-green); margin-bottom: 20px;"><i class="fa-solid fa-sliders"></i> إعدادات العرض والوضع المظلم</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee;">
                <span>الوضع الليلي (Dark Theme)</span>
                <button id="theme-toggle" class="theme-btn" style="padding: 8px 15px; background: var(--emerald-green); color: white; border: none; border-radius: 20px; cursor: pointer;">تبديل المظهر</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
                <span>حفظ بيانات التتبع والصلاة محلياً</span>
                <button onclick="localStorage.clear(); alert('تم مسح البيانات بنجاح');" style="padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 20px; cursor: pointer;">إعادة ضبط البيانات</button>
            </div>
        </section>
    </main>
</body>
</html>
